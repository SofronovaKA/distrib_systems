syntax = "proto3";

package calendar;

// Нужно для использования пустого запроса в ListEvents
message Empty {}

service CalendarService {
    rpc CreateEvent(EventDetails) returns (CreateEventResponse);
    // Новый метод для получения списка
    rpc ListEvents(Empty) returns (EventList);
}

message EventDetails {
    string title = 1;
    string description = 2;
    string start_time = 3;
    string edd_time = 4;
    repeated string participants = 5;
}

message CreateEventResponse {
    string event_id = 1;
    bool success = 2;
}

// Новое сообщение для списка событий
message EventList {
    repeated EventDetails events = 1;
    int32 total_count = 2;
}
